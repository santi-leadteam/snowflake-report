# ---------------------------------------------------------------------
# SWEAT440 Paid Ads Dashboard — Meta account config
# ---------------------------------------------------------------------
# No campaign IDs needed. The ETL queries the ad account directly
# and attributes spend to studios via adset name matching.
# To add a studio: add an entry to the studios list below.
# To change the fetch start date: edit DAILY_START in fetch_paid_ads.py
# ---------------------------------------------------------------------

meta_account:
