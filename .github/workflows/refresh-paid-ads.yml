name: Refresh Paid Ads data

on:
  schedule:
    # 8:00 UTC = 3:00 AM EST / 4:00 AM EDT. Corre diario.
    # Corre DESPUÉS de refresh.yml (el de Snowflake) para no pisarlo.
    - cron: "15 8 * * *"
  workflow_dispatch: {}        # permite correrlo manual desde la UI
  push:
    branches: [paid-ads-dashboard]
    paths:
      - "paid-ads-dashboards/fetch_paid_ads.py"
      - "paid-ads-dashboards/meta_client.py"
      - "paid-ads-dashboards/config.yaml"
      - ".github/workflows/refresh-paid-ads.yml"

permissions:
  contents: write               # para poder hacer commit del JSON

concurrency:
  group: refresh-paid-ads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: paid-ads-dashboards/requirements-paid-ads.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r paid-ads-dashboards/requirements-paid-ads.txt

      - name: Run ETL (Meta → paid-ads-dashboards/paid-ads-data.json + daniel-paid-ads-data.json)
        env:
          # meta_client.py acepta META_TOKEN o META_ACCESS_TOKEN.
          META_TOKEN:        ${{ secrets.META_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_API_VERSION:  ${{ secrets.META_API_VERSION }}
        run: |
          cd paid-ads-dashboards
          python fetch_paid_ads.py
          # Sync a daniel-paid-ads-data.json (leído por paid-ads.html)
          cp paid-ads-data.json daniel-paid-ads-data.json
          # También mantener copia en root para otros dashboards (index.html, etc.)
          cp paid-ads-data.json ../paid-ads-data.json

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add paid-ads-dashboards/paid-ads-data.json paid-ads-dashboards/daniel-paid-ads-data.json paid-ads-data.json
          if git diff --cached --quiet; then
            echo "No changes in data files"
          else
            git commit -m "chore(paid-ads): refresh data $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
