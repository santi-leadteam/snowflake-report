<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SWEAT440 — Leads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--s-deep:#0084B5;--c-leads:#00A3E0;--c-ft:#00C9A7;--c-mem:#9aab00}
  body{font-family:'Open Sans',sans-serif;background:#f4f9fd;color:#1a1a2e;min-height:100vh} .oswald{font-family:'Oswald',sans-serif;font-style:italic;text-transform:uppercase}

  .nav{background:var(--s-deep);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:200}
  .nav-logo img{height:30px;display:block;filter:brightness(0) invert(1)}
  .nav-tabs{display:flex;gap:2px}
  .nav-tab{background:none;border:none;color:rgba(255,255,255,.65);font-family:'Oswald',sans-serif;font-style:italic;font-size:13px;font-weight:500;padding:8px 13px;border-radius:6px;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,.1)}
  .nav-tab.active{color:#fff;background:rgba(255,255,255,.2)}
  .hamburger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:4px}
  .hamburger span{display:block;width:22px;height:2px;background:#fff;border-radius:2px}

  .controls-bar{background:#fff;border-bottom:0.5px solid #dde8ef;position:relative;z-index:150}
  .controls-toggle{display:none;width:100%;background:none;border:none;color:#5a7a8a;font-size:12px;font-weight:600;text-align:left;padding:10px 20px;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
  .controls-inner{max-width:1200px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .ctrl-label{font-family:'Oswald',sans-serif;font-style:italic;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:#5a7a8a;white-space:nowrap}
  .ctrl-sep{width:1px;height:20px;background:#dde8ef;margin:0 4px}
  select{font-size:12px;padding:5px 10px;border-radius:6px;border:0.5px solid #c0d4df;background:#fff;color:#1a1a2e;cursor:pointer}
  .ctrl-date{display:flex;align-items:center;gap:6px}
  .ctrl-date input{font-size:12px;padding:5px 8px;border-radius:6px;border:0.5px solid #c0d4df;background:#fff;color:#1a1a2e;width:126px}

  .main{max-width:1200px;margin:0 auto;padding:24px}
  .tab-content{display:none}
  .tab-content.active{display:block}

  .chart-card{background:#fff;border:0.5px solid #dde8ef;border-radius:12px;padding:22px;margin-bottom:20px}
  .chart-card-title{font-family:'Oswald',sans-serif;font-style:italic;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#1a1a2e;margin-bottom:18px}

  .funnel-wrap{display:flex;flex-direction:column;gap:16px}
  .funnel-stage-label{font-family:'Oswald',sans-serif;font-style:italic;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1.5px;color:#5a7a8a;margin-bottom:5px}
  .funnel-row{display:flex;align-items:center;gap:12px}
  .funnel-bar-track{flex:1;height:44px;background:#f0f6fa;border-radius:8px;overflow:hidden}
  .funnel-bar-fill{height:100%;border-radius:8px;transition:width .9s cubic-bezier(.4,0,.2,1);min-width:4px}
  .funnel-num{font-family:'Open Sans',sans-serif;font-size:20px;font-weight:600;color:#1a1a2e;white-space:nowrap;min-width:90px}
  .funnel-deltas{display:flex;flex-direction:column;gap:3px;min-width:160px}
  .delta{font-family:'Open Sans',sans-serif;font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px}
  .delta.pos{color:#0a8a4a}
  .delta.neg{color:#d32f2f}
  .delta.neu{color:#5a7a8a}

  .toggle-group{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .tog-btn{display:flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;border:1.5px solid transparent;font-family:'Oswald',sans-serif;font-style:italic;font-size:13px;font-weight:500;text-transform:uppercase;cursor:pointer;transition:all .15s}
  .tog-btn .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  .placeholder-content{display:flex;align-items:center;justify-content:center;min-height:340px;color:#5a7a8a;font-family:'Oswald',sans-serif;font-style:italic;font-size:16px;font-weight:500;text-transform:uppercase;flex-direction:column;gap:10px;border:1.5px dashed #c0d4df;border-radius:12px}
  .placeholder-content .coming{font-size:12px;font-weight:400;color:#8aaabb}

  /* Multi-select */
  .multi-select{position:relative;min-width:160px}
  .ms-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 10px;border-radius:6px;border:0.5px solid #c0d4df;background:#fff;color:#1a1a2e;font-size:12px;cursor:pointer;white-space:nowrap}
  .ms-trigger:hover{border-color:#00A3E0}
  .ms-arrow{font-size:10px;color:#5a7a8a;transition:transform .15s}
  .ms-menu{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:220px;max-height:260px;overflow-y:auto;background:#fff;border:0.5px solid #c0d4df;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;padding:6px 0}
  .ms-menu.open{display:block}
  .ms-item{display:flex;align-items:center;gap:8px;padding:6px 14px;font-size:12px;cursor:pointer;color:#1a1a2e;transition:background .1s}
  .ms-item:hover{background:#f0f6fa}
  .ms-item input[type=checkbox]{accent-color:#00A3E0;width:14px;height:14px;flex-shrink:0;cursor:pointer}
  .ms-divider{height:1px;background:#eef3f7;margin:4px 0}
  .ms-select-all{font-family:'Oswald',sans-serif;font-style:italic;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:#0084B5}

  /* Granularity toggle */
  .gran-group{display:flex;gap:0;margin-bottom:16px;border:0.5px solid #c0d4df;border-radius:6px;overflow:hidden;width:fit-content}
  .gran-btn{background:#fff;border:none;padding:5px 14px;font-family:'Oswald',sans-serif;font-style:italic;font-size:13px;font-weight:500;color:#5a7a8a;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
  .gran-btn:not(:last-child){border-right:0.5px solid #c0d4df}
  .gran-btn.active{background:#00A3E0;color:#fff}
  .gran-btn:disabled{opacity:.35;cursor:not-allowed;background:#f4f9fd}

  @media(max-width:768px){
    .nav-tabs{display:none;position:absolute;top:60px;left:0;right:0;background:var(--s-deep);flex-direction:column;padding:8px 0;z-index:199;box-shadow:0 4px 12px rgba(0,0,0,.2)}
    .nav-tabs.open{display:flex}
    .nav-tab{border-radius:0;padding:13px 20px;font-size:13px}
    .hamburger{display:flex}
    .controls-toggle{display:block}
    .controls-inner{display:none;flex-direction:column;align-items:stretch;gap:10px;padding:12px 20px}
    .controls-inner.open{display:flex}
    .ctrl-sep{display:none}
    select,.ctrl-date input{width:100%}
    .ctrl-date{flex-direction:column;align-items:stretch}
    .funnel-num{min-width:70px;font-size:16px}
    .funnel-deltas{min-width:120px}
    .main{padding:14px}
    canvas{max-width:100%!important}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo"><img src="logo.png" alt="SWEAT440"/></div>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="switchTab('funnel',this)">Funnel</button>
    <button class="nav-tab" onclick="switchTab('leads',this)">Leads</button>
    <button class="nav-tab" onclick="switchTab('stage',this)">Stage</button>
    <button class="nav-tab" onclick="switchTab('cpr',this)">CPR</button>
    <button class="nav-tab" onclick="switchTab('meta',this)">Meta Ads</button>
    <button class="nav-tab" onclick="switchTab('google',this)">Google Ads</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleNav()" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="controls-bar">
  <button class="controls-toggle" id="ctrlToggle" onclick="toggleControls()">Filters ▾</button>
  <div class="controls-inner" id="ctrlInner">
    <span class="ctrl-label">Studio</span>
    <div class="multi-select" id="studioDropdown">
      <button class="ms-trigger" onclick="toggleDropdown('studio')">
        <span id="studioLabel">All Studios</span><span class="ms-arrow">▾</span>
      </button>
      <div class="ms-menu" id="studioMenu"></div>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">Source</span>
    <div class="multi-select" id="sourceDropdown">
      <button class="ms-trigger" onclick="toggleDropdown('source')">
        <span id="sourceLabel">All Sources</span><span class="ms-arrow">▾</span>
      </button>
      <div class="ms-menu" id="sourceMenu"></div>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label">Date range</span>
    <div class="ctrl-date">
      <input type="date" id="fFrom" onchange="applyFilters()"/>
      <span style="font-size:12px;color:#5a7a8a">→</span>
      <input type="date" id="fTo" onchange="applyFilters()"/>
    </div>
  </div>
</div>

<div class="main">
  <div class="tab-content active" id="tab-funnel">
    <div class="chart-card">
      <div class="chart-card-title">Conversion funnel</div>
      <div class="funnel-wrap" id="funnelBars"></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-title">Funnel over time</div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
        <div class="toggle-group" style="margin-bottom:0">
          <button class="tog-btn on" data-ds="0" onclick="toggleDs(this,0)" style="border-color:#00A3E0;background:#00A3E0;color:#fff"><span class="dot" style="background:#fff"></span>Leads</button>
          <button class="tog-btn on" data-ds="1" onclick="toggleDs(this,1)" style="border-color:#00C9A7;background:#00C9A7;color:#fff"><span class="dot" style="background:#fff"></span>First Timers</button>
          <button class="tog-btn on" data-ds="2" onclick="toggleDs(this,2)" style="border-color:#9aab00;background:#9aab00;color:#fff"><span class="dot" style="background:#fff"></span>New Members</button>
        </div>
        <div class="gran-group">
          <button class="gran-btn" id="granDaily"   onclick="setGran('daily')">Daily</button>
          <button class="gran-btn" id="granWeekly"  onclick="setGran('weekly')">Weekly</button>
          <button class="gran-btn active" id="granMonthly" onclick="setGran('monthly')">Monthly</button>
        </div>
      </div>
      <div style="position:relative;width:100%;height:260px">
        <canvas id="trendChart" role="img" aria-label="Line chart of leads, first timers and new members over time">Monthly funnel trend data.</canvas>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-leads">
    <div class="placeholder-content"><span style="font-size:32px">📋</span><span>Leads</span><span class="coming">Coming soon</span></div>
  </div>
  <div class="tab-content" id="tab-stage">
    <div class="placeholder-content"><span style="font-size:32px">📊</span><span>Stage View</span><span class="coming">Coming soon</span></div>
  </div>
  <div class="tab-content" id="tab-cpr">
    <div class="placeholder-content"><span style="font-size:32px">💰</span><span>CPR View</span><span class="coming">Coming soon</span></div>
  </div>
  <div class="tab-content" id="tab-meta">
    <div class="placeholder-content"><span style="font-size:32px">📱</span><span>Meta Ads</span><span class="coming">Coming soon</span></div>
  </div>
  <div class="tab-content" id="tab-google">
    <div class="placeholder-content"><span style="font-size:32px">🔍</span><span>Google Ads</span><span class="coming">Coming soon</span></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
let RAW = null;
let trendChart = null;
let GRAN = 'daily';
const COLORS = ['#00A3E0','#00C9A7','#9aab00'];

const DEFAULT_EXCL_SOURCES = ['ClassPass / Platforms','Grassroots'];
const DEFAULT_EXCL_STUDIOS = [
  'SWEAT440 Dallas - Prestonwood','SWEAT440 Herriman','SWEAT440 Naples - Mercato',
  'SWEAT440 Nashville - Capitol View','SWEAT440 Pinecrest - Palmetto Bay','SWEAT440 Reston'
];

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('navTabs').classList.remove('open');
}
function toggleNav() { document.getElementById('navTabs').classList.toggle('open'); }
function toggleControls() {
  const el = document.getElementById('ctrlInner');
  el.classList.toggle('open');
  document.getElementById('ctrlToggle').textContent = el.classList.contains('open') ? 'Filters ▴' : 'Filters ▾';
}

// Default: last complete month
const TODAY = new Date();
const firstOfThisMonth = new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
const lastOfPrevMonth  = new Date(firstOfThisMonth - 1);
const firstOfPrevMonth = new Date(lastOfPrevMonth.getFullYear(), lastOfPrevMonth.getMonth(), 1);
document.getElementById('fFrom').value = firstOfPrevMonth.toISOString().slice(0,10);
document.getElementById('fTo').value   = lastOfPrevMonth.toISOString().slice(0,10);

// Multi-select
function toggleDropdown(id) {
  document.querySelectorAll('.ms-menu').forEach(m => { if (m.id !== id+'Menu') m.classList.remove('open'); });
  document.getElementById(id+'Menu').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.multi-select')) document.querySelectorAll('.ms-menu').forEach(m => m.classList.remove('open'));
});

function buildMultiSelect(menuId, labelId, items, defaultExcluded) {
  const menu = document.getElementById(menuId);
  const allDiv = document.createElement('div');
  allDiv.className = 'ms-item ms-select-all';
  allDiv.innerHTML = `<input type="checkbox" id="${menuId}_all"> <label for="${menuId}_all" style="cursor:pointer">Select all</label>`;
  menu.appendChild(allDiv);
  const div0 = document.createElement('div'); div0.className = 'ms-divider'; menu.appendChild(div0);

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'ms-item';
    const checked = !defaultExcluded.includes(item);
    const safeId = `ms_${menuId}_${item.replace(/[^a-z0-9]/gi,'_')}`;
    div.innerHTML = `<input type="checkbox" id="${safeId}" value="${item}" ${checked?'checked':''}> <label for="${safeId}" style="cursor:pointer">${item}</label>`;
    div.querySelector('input').addEventListener('change', () => { syncSelectAll(menuId); updateLabel(menuId, labelId, items); applyFilters(); });
    menu.appendChild(div);
  });

  const allChk = document.getElementById(menuId+'_all');
  syncSelectAll(menuId);
  allChk.addEventListener('change', () => {
    menu.querySelectorAll('input[value]').forEach(c => c.checked = allChk.checked);
    updateLabel(menuId, labelId, items); applyFilters();
  });
  updateLabel(menuId, labelId, items);
}

function syncSelectAll(menuId) {
  const menu = document.getElementById(menuId);
  const all  = [...menu.querySelectorAll('input[value]')];
  const allChk = document.getElementById(menuId+'_all');
  const n = all.filter(c=>c.checked).length;
  allChk.checked = n === all.length;
  allChk.indeterminate = n > 0 && n < all.length;
}

function updateLabel(menuId, labelId, items) {
  const checked = [...document.getElementById(menuId).querySelectorAll('input[value]:checked')].map(c=>c.value);
  const label = document.getElementById(labelId);
  if      (checked.length === 0)            label.textContent = 'None selected';
  else if (checked.length === items.length) label.textContent = 'All';
  else if (checked.length <= 2)             label.textContent = checked.join(', ');
  else                                      label.textContent = checked.length + ' selected';
}

function getSelected(menuId) {
  const menu = document.getElementById(menuId);
  if (!menu) return null;
  return [...menu.querySelectorAll('input[value]:checked')].map(c=>c.value);
}

// Granularity
function getQuarterBounds() {
  const now = new Date();
  const qStart = new Date(now.getFullYear(), Math.floor(now.getMonth()/3)*3, 1);
  const prevQStart = new Date(qStart); prevQStart.setMonth(prevQStart.getMonth()-3);
  return { dailyFrom: prevQStart, dailyTo: now };
}

function setGran(gran) {
  GRAN = gran;
  ['daily','weekly','monthly'].forEach(g => {
    const btn = document.getElementById('gran'+g.charAt(0).toUpperCase()+g.slice(1));
    if (btn) btn.classList.toggle('active', g === gran);
  });
  applyFilters();
}

function updateGranButtons(from, to) {
  const { dailyFrom } = getQuarterBounds();
  const withinDaily = from >= dailyFrom;
  const daysDiff = (to - from) / 86400000;
  const btnD = document.getElementById('granDaily');
  const btnW = document.getElementById('granWeekly');
  if (btnD) btnD.disabled = !withinDaily;
  if (btnW) btnW.disabled = daysDiff > 366;
  if (GRAN === 'daily'  && btnD && btnD.disabled) { GRAN = 'weekly';  setGran('weekly'); }
  if (GRAN === 'weekly' && btnW && btnW.disabled) { GRAN = 'monthly'; setGran('monthly'); }
}

async function loadData() {
  try {
    const res = await fetch('data.json?_=' + Date.now());
    RAW = await res.json();
  } catch(e) {
    console.warn('Using mock data:', e); RAW = getMock();
  }
  buildMultiSelect('studioMenu', 'studioLabel', RAW.studios, DEFAULT_EXCL_STUDIOS);
  buildMultiSelect('sourceMenu', 'sourceLabel', RAW.sources, DEFAULT_EXCL_SOURCES);
  setGran('daily');
  applyFilters();
}

function getRowDate(r) { return new Date((r.date||r.month)+'T00:00:00Z'); }

function filterRows(arr, fromDate, toDate, studios, sources) {
  return arr.filter(r => {
    const d = getRowDate(r);
    if (fromDate && d < fromDate) return false;
    if (toDate   && d > toDate)   return false;
    if (studios  && !studios.includes(r.studio)) return false;
    if (sources  && !sources.includes(r.source)) return false;
    return true;
  });
}

function sumRows(rows) {
  return rows.reduce((acc,r) => {
    acc.leads += r.signups||0; acc.ft += r.first_visits||0; acc.mem += r.first_activations||0;
    return acc;
  }, {leads:0,ft:0,mem:0});
}

function computeWindows(from, to) {
  const ms = to - from;
  const ppTo   = new Date(from.getTime()-86400000);
  const ppFrom = new Date(ppTo.getTime()-ms);
  const pyFrom = new Date(from); pyFrom.setFullYear(pyFrom.getFullYear()-1);
  const pyTo   = new Date(to);   pyTo.setFullYear(pyTo.getFullYear()-1);
  return {ppFrom,ppTo,pyFrom,pyTo};
}
function fmtDate(d) { return d.toLocaleString('en-US',{month:'short',year:'numeric'}); }
function fmtMonthLabel(iso) { return new Date(iso+'T00:00:00Z').toLocaleString('en-US',{month:'short',year:'2-digit',timeZone:'UTC'}); }
function fmtDayLabel(iso)   { return new Date(iso+'T00:00:00Z').toLocaleString('en-US',{month:'short',day:'numeric',timeZone:'UTC'}); }

function toTimeSeries(dailyRows, monthlyRows) {
  if (GRAN === 'daily') {
    const map = {};
    dailyRows.forEach(r => {
      if (!map[r.date]) map[r.date]={key:r.date,label:fmtDayLabel(r.date),signups:0,first_visits:0,first_activations:0};
      map[r.date].signups+=r.signups||0; map[r.date].first_visits+=r.first_visits||0; map[r.date].first_activations+=r.first_activations||0;
    });
    return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
  }
  if (GRAN === 'weekly') {
    const map = {};
    [...dailyRows,...monthlyRows].forEach(r => {
      const d = new Date((r.date||r.month)+'T00:00:00Z');
      const day = d.getUTCDay()||7;
      const ws = new Date(d); ws.setUTCDate(d.getUTCDate()-day+1);
      const key = ws.toISOString().slice(0,10);
      if (!map[key]) map[key]={key,label:fmtDayLabel(key),signups:0,first_visits:0,first_activations:0};
      map[key].signups+=r.signups||0; map[key].first_visits+=r.first_visits||0; map[key].first_activations+=r.first_activations||0;
    });
    return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
  }
  // monthly
  const map = {};
  [...dailyRows,...monthlyRows].forEach(r => {
    const key=(r.date||r.month).slice(0,7)+'-01';
    if (!map[key]) map[key]={key,label:fmtMonthLabel(key),signups:0,first_visits:0,first_activations:0};
    map[key].signups+=r.signups||0; map[key].first_visits+=r.first_visits||0; map[key].first_activations+=r.first_activations||0;
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
}

function applyFilters() {
  if (!RAW) return;
  const studios = getSelected('studioMenu');
  const sources  = getSelected('sourceMenu');
  const fromStr = document.getElementById('fFrom').value;
  const toStr   = document.getElementById('fTo').value;
  const from = fromStr ? new Date(fromStr+'T00:00:00Z') : new Date(RAW.monthly_detail[0]?.month+'T00:00:00Z');
  const to   = toStr   ? new Date(toStr+'T23:59:59Z')   : new Date();
  updateGranButtons(from, to);
  const {ppFrom,ppTo,pyFrom,pyTo} = computeWindows(from,to);
  function filterAll(f,t) {
    return {
      daily:   filterRows(RAW.daily_detail,   f, t, studios, sources),
      monthly: filterRows(RAW.monthly_detail, f, t, studios, sources),
      get all() { return [...this.daily,...this.monthly]; }
    };
  }
  const curr = filterAll(from,to);
  const pp   = filterAll(ppFrom,ppTo);
  const py   = filterAll(pyFrom,pyTo);
  buildFunnel(sumRows(curr.all), sumRows(pp.all), sumRows(py.all),
    `${fmtDate(ppFrom)} – ${fmtDate(ppTo)}`, `${fmtDate(pyFrom)} – ${fmtDate(pyTo)}`);
  buildTrend(toTimeSeries(curr.daily, curr.monthly));
}

function calcDelta(curr,prev) { if(!prev||prev===0) return null; return (curr-prev)/prev*100; }

function buildFunnel(curr, prev, pyear, ppLabel, pyLabel) {
  const stages = [
    {label:'Leads',       curr:curr.leads,prev:prev.leads,py:pyear.leads,color:'#00A3E0'},
    {label:'First Timers',curr:curr.ft,   prev:prev.ft,   py:pyear.ft,   color:'#00C9A7'},
    {label:'New Members', curr:curr.mem,  prev:prev.mem,  py:pyear.mem,  color:'#9aab00'},
  ];
  const max = Math.max(...stages.map(s=>s.curr),1);
  document.getElementById('funnelBars').innerHTML = stages.map(s => {
    const w = Math.max(2,(s.curr/max)*100);
    const dpp = calcDelta(s.curr,s.prev);
    const dpy = calcDelta(s.curr,s.py);
    const ppHTML = dpp!==null ? `<span class="delta ${dpp>=0?'pos':'neg'}" title="vs ${ppLabel}">${dpp>=0?'▲':'▼'} ${Math.abs(dpp).toFixed(1)}% prev period</span>` : `<span class="delta neu">— prev period</span>`;
    const pyHTML = dpy!==null ? `<span class="delta ${dpy>=0?'pos':'neg'}" title="vs ${pyLabel}">${dpy>=0?'▲':'▼'} ${Math.abs(dpy).toFixed(1)}% prev year</span>`   : `<span class="delta neu">— prev year</span>`;
    return `<div><div class="funnel-stage-label">${s.label}</div><div class="funnel-row"><div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${w}%;background:${s.color}"></div></div><div class="funnel-num">${s.curr.toLocaleString()}</div><div class="funnel-deltas">${ppHTML}${pyHTML}</div></div></div>`;
  }).join('');
}

function buildTrend(series) {
  const isMobile = window.innerWidth <= 768;
  const labels = series.map(m=>m.label);
  const leadsD = series.map(m=>m.signups||0);
  const ftD    = series.map(m=>m.first_visits||0);
  const memD   = series.map(m=>m.first_activations||0);
  if (trendChart) {
    const hidden = trendChart.data.datasets.map(ds=>ds.hidden);
    trendChart.data.labels=labels;
    trendChart.data.datasets[0].data=leadsD;
    trendChart.data.datasets[1].data=ftD;
    trendChart.data.datasets[2].data=memD;
    trendChart.data.datasets.forEach((ds,i)=>ds.hidden=hidden[i]);
    trendChart.update(); return;
  }
  const ctx = document.getElementById('trendChart').getContext('2d');
  trendChart = new Chart(ctx, {
    type:'line',
    data:{labels,datasets:[
      {label:'Leads',       data:leadsD,borderColor:'#00A3E0',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:.4,fill:false,borderDash:[]},
      {label:'First Timers',data:ftD,   borderColor:'#00C9A7',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:.4,fill:false,borderDash:[6,3]},
      {label:'New Members', data:memD,  borderColor:'#9aab00',borderWidth:2.5,pointRadius:3,pointHoverRadius:6,tension:.4,fill:false,borderDash:[2,3]},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},
      scales:{
        x:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:11},color:'#5a7a8a',autoSkip:true,maxTicksLimit:isMobile?5:12,maxRotation:0}},
        y:{grid:{color:'rgba(0,0,0,.05)'},ticks:{font:{size:11},color:'#5a7a8a'}}
      }
    }
  });
}

function toggleDs(btn, i) {
  if (!trendChart) return;
  const ds = trendChart.data.datasets[i];
  ds.hidden = !ds.hidden;
  btn.classList.toggle('on');
  if (btn.classList.contains('on')) { btn.style.background=COLORS[i]; btn.style.borderColor=COLORS[i]; btn.style.color='#fff'; }
  else { btn.style.background='#f4f9fd'; btn.style.borderColor='#c0d4df'; btn.style.color='#5a7a8a'; }
  trendChart.update();
}


function getMock() {
  const months = ['2023-04-01','2023-05-01','2023-06-01','2023-07-01','2023-08-01','2023-09-01',
                  '2023-10-01','2023-11-01','2023-12-01','2024-01-01','2024-02-01','2024-03-01',
                  '2024-04-01','2024-05-01','2024-06-01','2024-07-01','2024-08-01','2024-09-01',
                  '2024-10-01','2024-11-01','2024-12-01','2025-01-01','2025-02-01','2025-03-01','2025-04-01'];
  const studios = ['Miami Beach','Brickell','Wynwood','Coral Gables'];
  const sources  = ['Meta','Google','Organic','Referral'];
  const rows = [];
  months.forEach((m, mi) => {
    studios.forEach(st => {
      sources.forEach(sr => {
        const base = 15 + mi + studios.indexOf(st) * 3;
        rows.push({ month:m, studio:st, source:sr,
          signups:           Math.round(base * (0.8 + Math.random() * 0.4)),
          first_visits:      Math.round(base * (0.4 + Math.random() * 0.2)),
          first_activations: Math.round(base * (0.15 + Math.random() * 0.1)),
          first_sales:       Math.round(base * (0.07 + Math.random() * 0.05)),
        });
      });
    });
  });
  return { studios, sources, monthly_detail: rows };
}
