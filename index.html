<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SWEAT440 — Leads Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --blue:      #00A3E0;
    --blue-deep: #0084B5;
    --blue-light:#99DAF3;
    --blue-pale: #D2EFFF;
    --cyan:      #00FFC2;
    --yellow:    #DDFF00;
    --white:     #ffffff;
    --off:       #f4f9fd;
    --text:      #1a1a2e;
    --muted:     #5a7a8a;
    --card-shadow: 0 4px 24px rgba(0,163,224,0.10);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Open Sans', sans-serif;
    background: var(--off);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--blue);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,132,181,0.3);
  }

  .logo {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-weight: 700;
    font-size: 28px;
    color: var(--white);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo span {
    color: var(--yellow);
  }

  .header-meta {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    text-align: right;
    line-height: 1.6;
  }

  .header-meta strong {
    color: var(--cyan);
    font-size: 13px;
  }

  /* ── LAYOUT ── */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 36px 32px 60px;
  }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--blue);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--blue-light);
  }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }

  .kpi-card {
    background: var(--white);
    border-radius: 14px;
    padding: 28px 24px 22px;
    box-shadow: var(--card-shadow);
    border-top: 4px solid var(--blue);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .kpi-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(0,163,224,0.18);
  }

  .kpi-card:nth-child(1) { border-top-color: var(--blue); }
  .kpi-card:nth-child(2) { border-top-color: var(--blue-deep); }
  .kpi-card:nth-child(3) { border-top-color: var(--cyan); }
  .kpi-card:nth-child(4) { border-top-color: var(--yellow); }

  .kpi-card::after {
    content: '';
    position: absolute;
    bottom: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    opacity: 0.07;
    background: var(--blue);
  }

  .kpi-label {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .kpi-value {
    font-family: 'Oswald', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 6px;
  }

  .kpi-conv {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }

  .kpi-conv strong {
    color: var(--blue);
  }

  /* ── CHARTS GRID ── */
  .charts-row {
    display: grid;
    gap: 24px;
    margin-bottom: 28px;
  }

  .charts-row.two-col { grid-template-columns: 2fr 1fr; }
  .charts-row.two-equal { grid-template-columns: 1fr 1fr; }

  .card {
    background: var(--white);
    border-radius: 14px;
    padding: 28px;
    box-shadow: var(--card-shadow);
  }

  .card-title {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-weight: 600;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 22px;
    padding-bottom: 14px;
    border-bottom: 2px solid var(--blue-pale);
  }

  .chart-wrap {
    position: relative;
  }

  /* ── FUNNEL ── */
  .funnel-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-top: 4px;
  }

  .funnel-stage {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .funnel-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    width: 110px;
    flex-shrink: 0;
  }

  .funnel-bar-wrap {
    flex: 1;
    height: 36px;
    background: var(--blue-pale);
    border-radius: 6px;
    overflow: hidden;
  }

  .funnel-bar {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding-left: 12px;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--white);
    transition: width 1s cubic-bezier(.4,0,.2,1);
    min-width: 60px;
  }

  .funnel-conv {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    width: 52px;
    text-align: right;
    flex-shrink: 0;
  }

  /* ── TABLE ── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .data-table thead th {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 2px solid var(--blue-pale);
    text-align: left;
  }

  .data-table thead th:not(:first-child) { text-align: right; }

  .data-table tbody tr {
    border-bottom: 1px solid var(--blue-pale);
    transition: background 0.15s;
  }

  .data-table tbody tr:hover { background: var(--blue-pale); }
  .data-table tbody tr:last-child { border-bottom: none; }

  .data-table td {
    padding: 10px 12px;
    color: var(--text);
  }

  .data-table td:not(:first-child) {
    text-align: right;
    font-weight: 600;
    color: var(--blue-deep);
  }

  .data-table td:first-child {
    font-weight: 600;
  }

  /* ── LOADING / ERROR ── */
  #loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 16px;
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-size: 18px;
    letter-spacing: 2px;
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 4px solid var(--blue-pale);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #dashboard { display: none; }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
  }

  .filter-btn {
    background: var(--white);
    border: 2px solid var(--blue-light);
    color: var(--muted);
    font-family: 'Oswald', sans-serif;
    font-style: italic;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 7px 18px;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: var(--white);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row.two-col,
    .charts-row.two-equal { grid-template-columns: 1fr; }
    main { padding: 24px 16px 48px; }
    header { padding: 0 20px; }
  }
  @media (max-width: 520px) {
    .kpi-grid { grid-template-columns: 1fr; }
    .kpi-value { font-size: 34px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SWEAT<span>440</span></div>
  <div class="header-meta">
    <strong>LEADS DASHBOARD</strong><br>
    Last updated: <span id="updated-at">—</span>
  </div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    LOADING DATA…
  </div>

  <div id="dashboard">

    <!-- KPIs -->
    <div class="section-title">Overview</div>
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- Trend + Funnel -->
    <div class="section-title">Trends &amp; Funnel</div>
    <div class="charts-row two-col" style="margin-bottom:28px">
      <div class="card">
        <div class="card-title">Monthly Lead Funnel — Last 12 Months</div>
        <div class="filter-bar">
          <span class="filter-label">Show:</span>
          <button class="filter-btn active" data-metric="signups">Signups</button>
          <button class="filter-btn active" data-metric="first_visits">First Visits</button>
          <button class="filter-btn active" data-metric="first_activations">Activations</button>
          <button class="filter-btn active" data-metric="first_sales">First Sales</button>
        </div>
        <div class="chart-wrap" style="height:260px">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Conversion Funnel</div>
        <div class="funnel-wrap" id="funnel-wrap"></div>
      </div>
    </div>

    <!-- Studio + Source -->
    <div class="section-title">Breakdown</div>
    <div class="charts-row two-equal">
      <div class="card">
        <div class="card-title">Signups by Studio</div>
        <div class="chart-wrap" style="height:280px">
          <canvas id="studio-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Signups by Source</div>
        <div class="chart-wrap" style="height:280px">
          <canvas id="source-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- Studio table -->
    <div class="section-title" style="margin-top:28px">Studio Detail</div>
    <div class="card">
      <div class="card-title">All Studios — Full Funnel</div>
      <div style="overflow-x:auto">
        <table class="data-table" id="studio-table">
          <thead>
            <tr>
              <th>Studio</th>
              <th>Signups</th>
              <th>First Visits</th>
              <th>Activations</th>
              <th>First Sales</th>
              <th>Visit Rate</th>
              <th>Sale Rate</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div><!-- /dashboard -->
</main>

<script>
const BLUE      = '#00A3E0';
const BLUE_DEEP = '#0084B5';
const CYAN      = '#00FFC2';
const YELLOW    = '#DDFF00';
const PALE      = '#D2EFFF';
const LIGHT     = '#99DAF3';

const PALETTE = [BLUE, BLUE_DEEP, CYAN, '#00C9A7', '#7BC8F6', '#005F85', YELLOW, '#B8D900'];

function fmt(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}
function pct(a, b) {
  if (!b || b === 0) return '—';
  return (a / b * 100).toFixed(1) + '%';
}

async function loadData() {
  const res  = await fetch('data.json?_=' + Date.now());
  const data = await res.json();

  document.getElementById('updated-at').textContent =
    new Date(data.generated_at).toLocaleString('en-US', {
      month: 'short', day: 'numeric', year: 'numeric',
      hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });

  buildKPIs(data.kpis, data.funnel);
  buildTrend(data.monthly);
  buildFunnel(data.funnel);
  buildStudioChart(data.by_studio);
  buildSourceChart(data.by_source);
  buildStudioTable(data.by_studio);

  document.getElementById('loading').style.display   = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

function buildKPIs(kpis, funnel) {
  const cards = [
    { label: 'Total Signups',      value: kpis.total_signups,           conv: null },
    { label: 'First Visits',       value: kpis.total_first_visits,      conv: pct(kpis.total_first_visits, kpis.total_signups) + ' of signups' },
    { label: 'First Activations',  value: kpis.total_first_activations, conv: pct(kpis.total_first_activations, kpis.total_signups) + ' of signups' },
    { label: 'First Sales',        value: kpis.total_first_sales,       conv: pct(kpis.total_first_sales, kpis.total_signups) + ' of signups' },
  ];
  document.getElementById('kpi-grid').innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${fmt(c.value)}</div>
      ${c.conv ? `<div class="kpi-conv"><strong>${c.conv}</strong></div>` : ''}
    </div>
  `).join('');
}

let trendChart;
function buildTrend(monthly) {
  const labels = monthly.map(m => {
    const d = new Date(m.month);
    return d.toLocaleString('en-US', { month: 'short', year: '2-digit' });
  });

  const datasets = [
    { key: 'signups',           label: 'Signups',      color: BLUE },
    { key: 'first_visits',      label: 'First Visits', color: BLUE_DEEP },
    { key: 'first_activations', label: 'Activations',  color: CYAN },
    { key: 'first_sales',       label: 'First Sales',  color: YELLOW },
  ].map(d => ({
    label: d.label,
    data: monthly.map(m => m[d.key]),
    borderColor: d.color,
    backgroundColor: d.color + '22',
    borderWidth: 2.5,
    pointRadius: 3,
    pointHoverRadius: 6,
    tension: 0.4,
    fill: false,
    metricKey: d.key,
  }));

  const ctx = document.getElementById('trend-chart').getContext('2d');
  trendChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false,
        },
        tooltip: { mode: 'index', intersect: false },
      },
      scales: {
        x: { grid: { color: PALE }, ticks: { font: { family: 'Open Sans', size: 11 }, color: '#5a7a8a' } },
        y: { grid: { color: PALE }, ticks: { font: { family: 'Open Sans', size: 11 }, color: '#5a7a8a' } },
      },
    },
  });

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      const metric = btn.dataset.metric;
      const ds = trendChart.data.datasets.find(d => d.metricKey === metric);
      if (ds) {
        ds.hidden = !btn.classList.contains('active');
        trendChart.update();
      }
    });
  });
}

function buildFunnel(funnel) {
  const max = funnel[0]?.value || 1;
  const colors = [BLUE, BLUE_DEEP, CYAN, '#00C9A7'];
  document.getElementById('funnel-wrap').innerHTML = funnel.map((f, i) => {
    const w = Math.max(15, (f.value / max) * 100);
    const prev = i === 0 ? null : funnel[i-1].value;
    return `
      <div class="funnel-stage">
        <div class="funnel-label">${f.stage}</div>
        <div class="funnel-bar-wrap">
          <div class="funnel-bar" style="width:${w}%;background:${colors[i]}">${fmt(f.value)}</div>
        </div>
        <div class="funnel-conv">${prev ? pct(f.value, prev) : ''}</div>
      </div>
    `;
  }).join('');
}

function buildStudioChart(studios) {
  const top = studios.slice(0, 12);
  const ctx = document.getElementById('studio-chart').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: top.map(s => s.studio || 'Unknown'),
      datasets: [{
        label: 'Signups',
        data: top.map(s => s.signups),
        backgroundColor: top.map((_, i) => PALETTE[i % PALETTE.length] + 'cc'),
        borderColor:     top.map((_, i) => PALETTE[i % PALETTE.length]),
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#5a7a8a', maxRotation: 40 } },
        y: { grid: { color: PALE }, ticks: { font: { size: 11 }, color: '#5a7a8a' } },
      }
    }
  });
}

function buildSourceChart(sources) {
  const ctx = document.getElementById('source-chart').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sources.map(s => s.source || 'Unknown'),
      datasets: [{
        data: sources.map(s => s.signups),
        backgroundColor: sources.map((_, i) => PALETTE[i % PALETTE.length] + 'dd'),
        borderColor: '#fff',
        borderWidth: 3,
        hoverOffset: 8,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { font: { family: 'Open Sans', size: 11 }, padding: 12, boxWidth: 14 }
        }
      },
      cutout: '60%',
    }
  });
}

function buildStudioTable(studios) {
  const tbody = document.querySelector('#studio-table tbody');
  tbody.innerHTML = studios.map(s => `
    <tr>
      <td>${s.studio || 'Unknown'}</td>
      <td>${fmt(s.signups)}</td>
      <td>${fmt(s.first_visits)}</td>
      <td>${fmt(s.first_activations)}</td>
      <td>${fmt(s.first_sales)}</td>
      <td>${pct(s.first_visits, s.signups)}</td>
      <td>${pct(s.first_sales, s.signups)}</td>
    </tr>
  `).join('');
}

loadData().catch(err => {
  document.getElementById('loading').innerHTML =
    `<div style="color:#e05;font-family:Oswald;font-style:italic;font-size:16px">⚠ Could not load data.json<br><small style="font-size:12px;color:#888">${err.message}</small></div>`;
});
</script>
</body>
</html>
