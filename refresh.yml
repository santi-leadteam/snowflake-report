name: Refresh Dashboard Data

on:
  schedule:
    - cron: "0 8 * * *"   # Every day at 8:00 AM UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install snowflake-connector-python requests
          pip install google-ads

      - name: Fetch Snowflake + Meta account-level data
        env:
          SF_ACCOUNT:   ${{ secrets.SF_ACCOUNT }}
          SF_USER:      ${{ secrets.SF_USER }}
          SF_TOKEN:     ${{ secrets.SF_TOKEN }}
          SF_ROLE:      ${{ secrets.SF_ROLE }}
          SF_WAREHOUSE: ${{ secrets.SF_WAREHOUSE }}
          SF_DATABASE:  ${{ secrets.SF_DATABASE }}
          SF_SCHEMA:    ${{ secrets.SF_SCHEMA }}
          META_TOKEN:   ${{ secrets.META_TOKEN }}
          META_ACT:     ${{ secrets.META_ACT }}
        run: python fetch_data.py

      - name: Fetch Meta Ads (Santi - account view)
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python fetch_meta_ads.py
        continue-on-error: true

      - name: Fetch Google Ads data
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN:   ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:         ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:     ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:     ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
        run: python fetch_google_ads.py
        continue-on-error: true

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json meta-ads-data.json google-ads-data.json
          git diff --cached --quiet || git commit -m "chore: refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
